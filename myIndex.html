<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>記帳工具</title>
  <link rel="stylesheet" href="myHW.css">
</head>
<body>

<div class="container">
  <h1>💰 智能記帳工具</h1>

  <button id="loginBtn">🔐 登入 Google</button>

  <!-- 表單 -->
  <div class="form">
    <input type="date" id="date">

    <select id="type">
      <option value="收入">收入</option>
      <option value="支出">支出</option>
    </select>

    <select id="category"></select>
    <select id="payment"></select>

    <input type="number" id="amount" placeholder="金額">
    <input type="text" id="desc" placeholder="描述">

    <button id="addBtn">➕ 新增</button>
  </div>

  <!-- 統計 -->
  <div class="summary">
    <h2>📊 本月統計</h2>
    <p id="income">收入：0</p>
    <p id="expense">支出：0</p>
  </div>

  <!-- 分類統計 -->
  <div class="categoryBox">
    <h2>📈 支出分類排行</h2>
    <ul id="categoryStats"></ul>
  </div>

  <!-- 表格 -->
  <table>
    <thead>
      <tr>
        <th>日期</th>
        <th>類型</th>
        <th>分類</th>
        <th>金額</th>
        <th>描述</th>
        <th>付款</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://apis.google.com/js/api.js"></script>
<script src="myHW.js"></script>
</body>
</html>
